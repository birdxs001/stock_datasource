name: Build and Push All Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag version (e.g., v1.0.0, latest)'
        required: true
        default: 'latest'

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  # 统一的镜像仓库名称
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/stock_datasource
  DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/stock_datasource

jobs:
  # 前置任务：登录到镜像仓库（确保后续任务可以共享认证状态）
  login:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag: ${{ inputs.image_tag }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  # 构建并推送后端镜像
  build-backend:
    needs: login
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false  # 即使后端构建失败，前端仍继续（可按需调整）

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Set up QEMU for multi-platform build
        uses: docker/setup-qemu-action@v3

      # 重新登录（needs 不会自动传递认证上下文，因此每个 job 需单独登录）
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for GHCR (Backend)
        id: meta-ghcr-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=backend-${{ inputs.image_tag }}
            type=raw,value=backend-latest,enable=${{ inputs.image_tag != 'latest' }}
          flavor: |
            latest=false

      - name: Extract metadata for Docker Hub (Backend)
        id: meta-dh-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=backend-${{ inputs.image_tag }}
            type=raw,value=backend-latest,enable=${{ inputs.image_tag != 'latest' }}
          flavor: |
            latest=false

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta-ghcr-backend.outputs.tags }}
            ${{ steps.meta-dh-backend.outputs.tags }}
          labels: ${{ steps.meta-ghcr-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 构建并推送前端镜像
  build-frontend:
    needs: login
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Set up QEMU for multi-platform build
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for GHCR (Frontend)
        id: meta-ghcr-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=frontend-${{ inputs.image_tag }}
            type=raw,value=frontend-latest,enable=${{ inputs.image_tag != 'latest' }}
          flavor: |
            latest=false

      - name: Extract metadata for Docker Hub (Frontend)
        id: meta-dh-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=frontend-${{ inputs.image_tag }}
            type=raw,value=frontend-latest,enable=${{ inputs.image_tag != 'latest' }}
          flavor: |
            latest=false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/Dockerfile.frontend
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta-ghcr-frontend.outputs.tags }}
            ${{ steps.meta-dh-frontend.outputs.tags }}
          labels: ${{ steps.meta-ghcr-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 汇总输出信息
  summary:
    needs: [build-backend, build-frontend]
    if: always()  # 无论构建是否成功都生成汇总报告
    runs-on: ubuntu-24.04
    steps:
      - name: Generate build summary
        run: |
          echo "### 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag Input:** \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 后端结果
          if [[ "${{ needs.build-backend.result }}" == "success" ]]; then
            echo "✅ **Backend Image**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Backend Image** (failed)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:backend-${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Hub: \`${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:backend-${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          [[ "${{ inputs.image_tag }}" != "latest" ]] && echo "  *(also tagged as \`backend-latest\`)*" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 前端结果
          if [[ "${{ needs.build-frontend.result }}" == "success" ]]; then
            echo "✅ **Frontend Image**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Frontend Image** (failed)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- GHCR: \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:frontend-${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Hub: \`${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:frontend-${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          [[ "${{ inputs.image_tag }}" != "latest" ]] && echo "  *(also tagged as \`frontend-latest\`)*" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend (GHCR)**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:backend-${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend (Docker Hub)**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:backend-${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend (GHCR)**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:frontend-${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend (Docker Hub)**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:frontend-${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
